server {
    listen 80;

    # Serve the React static build
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all non-file routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── WebSocket proxy (recognition + enrollment) ─────────────────────────
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # keep WS alive for long sessions
    }

    # ── REST API proxy ──────────────────────────────────────────────────────
    location ~ ^/(enroll_status|reset_session|users) {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }
}
