services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      # Persist the face database (enrolled .npy files) across container restarts
      - ./backend/data:/app/backend/data
    networks:
      - app-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"     # Access the app at http://localhost:3000
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
